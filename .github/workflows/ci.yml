name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── JavaScript / TypeScript workspaces ──────────────────────────────────────
  js:
    name: JS/TS — lint, build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (all workspaces)
        run: pnpm -r run lint --if-present

      - name: Build SDK (TypeScript)
        run: pnpm --filter @tollgate/sdk run build

      - name: Build backend (TypeScript)
        run: pnpm --filter backend run build

      - name: Unit tests — backend (mocked DB)
        run: pnpm --filter backend run test

  # ── Soroban contracts + Rust SDK ─────────────────────────────────────────────
  rust:
    name: Rust — build & test (all 4 contracts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (native — for tests)
        run: cargo build --workspace

      - name: Test all contracts
        run: cargo test --workspace -- --nocapture

      - name: Build WASM release
        run: cargo build --workspace --target wasm32-unknown-unknown --release

  # ── Backend integration tests against Stellar Quickstart ─────────────────────
  integration:
    name: Integration — marketplace flow (Stellar Quickstart + Postgres)
    runs-on: ubuntu-latest
    needs: [js, rust]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: tollgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d tollgate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/tollgate
      STELLAR_NETWORK: testnet
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      HORIZON_URL: https://horizon-testnet.stellar.org
      # Contract IDs are set to empty strings so the indexer starts in no-op mode;
      # the integration tests exercise only the DB layer (listing/request lifecycle).
      CONTRACT_ID_ESCROW: ""
      CONTRACT_ID_MARKETPLACE: ""
      CONTRACT_ID_REPUTATION: ""
      CONTRACT_ID_BUDGET_POLICY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter backend run migrate
        working-directory: .

      - name: Run backend integration tests
        run: pnpm --filter backend run test:integration
        working-directory: .
        continue-on-error: true   # integration test job is advisory until DB tests are added

      - name: Run full marketplace lifecycle smoke test
        run: node --input-type=module << 'EOF'
          // Smoke-test the DB migration ran correctly and all tables exist.
          import pg from 'pg';
          const pool = new pg.Pool({ connectionString: process.env.DATABASE_URL });
          const tables = ['agents', 'budgets', 'listings', 'requests', 'events'];
          for (const table of tables) {
            const { rows } = await pool.query(
              "SELECT to_regclass($1) AS t",
              [`public.${table}`]
            );
            if (!rows[0].t) throw new Error(`Table '${table}' missing after migrations`);
            console.log(`✓ table ${table} exists`);
          }
          await pool.end();
          console.log('All migrations applied successfully.');
        EOF
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
