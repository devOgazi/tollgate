name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── JavaScript / TypeScript workspaces ──────────────────────────────────────
  js:
    name: JS/TS — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (all workspaces)
        run: pnpm -r run lint --if-present

      - name: Build SDK (TypeScript)
        run: pnpm --filter @tollgate/sdk run build

      - name: Build backend (TypeScript)
        run: pnpm --filter backend run build

  # ── Soroban contracts + Rust SDK ─────────────────────────────────────────────
  rust:
    name: Rust — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (native — for tests)
        run: cargo build --workspace

      - name: Test all contracts
        run: cargo test --workspace

      - name: Build WASM release
        run: cargo build --workspace --target wasm32-unknown-unknown --release
